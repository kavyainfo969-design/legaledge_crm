# Render manifest for LegalEdge CRM (Option A: separate frontend + backend + managed DB)
# Replace placeholders before importing into Render or committing.

services:
  - type: web_service
    name: legaledge-app
    env: python
    repo: https://github.com/kavyainfo969-design/legaledge_crm
    branch: main
    root: .
    plan: starter
    # Build both frontend and backend, copy frontend build into Django staticfiles,
    # run migrations and collectstatic so the single web service serves the app.
    buildCommand: |
      # Frontend build
      npm ci && npm run build;
      # Install Python deps and run Django tasks
      pip install -r legaledge_backend/requirements.txt;
      # Copy built frontend into backend static root
      mkdir -p legaledge_backend/staticfiles;
      cp -r dist/* legaledge_backend/staticfiles/ || true;
      cd legaledge_backend;
      python manage.py migrate --noinput;
      python manage.py collectstatic --noinput;
    startCommand: gunicorn config.wsgi:application --chdir legaledge_backend --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: DJANGO_DEBUG
        value: 'false'
      - key: SECRET_KEY
        value: 'REPLACE_WITH_SECURE_VALUE' # set this as a Render secret in the dashboard and update here or via UI
      - key: ALLOWED_HOSTS
        value: 'localhost,127.0.0.1,0.0.0.0,legaledge-crm-backend.onrender.com'
      - key: STATIC_ROOT
        value: '/opt/render/project/src/legaledge_backend/staticfiles'
      - key: DATABASE_URL
        fromDatabase: legaledge-db

databases:
  - name: legaledge-db
    engine: postgresql
    plan: starter
